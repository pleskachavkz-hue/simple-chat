<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Chat</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0f1117;
        color: #e8eaed;
        height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid #2a2f3a;
        background: #151922;
      }

      header h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 600;
      }

      #online-count {
        font-size: 0.875rem;
        color: #9aa0a6;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .message {
        max-width: min(75%, 520px);
        padding: 0.65rem 0.85rem;
        border-radius: 12px;
        line-height: 1.4;
        word-break: break-word;
      }

      .message.other {
        align-self: flex-start;
        background: #1e2430;
      }

      .message.own {
        align-self: flex-end;
        background: #2563eb;
      }

      .message-meta {
        font-size: 0.75rem;
        opacity: 0.75;
        margin-bottom: 0.25rem;
      }

      .system {
        align-self: center;
        font-size: 0.8rem;
        color: #9aa0a6;
        padding: 0.25rem 0;
      }

      #composer {
        display: flex;
        gap: 0.5rem;
        padding: 1rem 1.25rem;
        border-top: 1px solid #2a2f3a;
        background: #151922;
      }

      #message-input {
        flex: 1;
        padding: 0.75rem 0.9rem;
        border: 1px solid #2a2f3a;
        border-radius: 10px;
        background: #0f1117;
        color: #e8eaed;
        font: inherit;
      }

      #message-input:focus {
        outline: 2px solid #2563eb;
        outline-offset: 1px;
      }

      button {
        padding: 0.75rem 1rem;
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      #overlay.hidden {
        display: none;
      }

      .modal {
        width: min(100%, 360px);
        background: #151922;
        border: 1px solid #2a2f3a;
        border-radius: 14px;
        padding: 1.25rem;
      }

      .modal h2 {
        margin: 0 0 0.75rem;
        font-size: 1.1rem;
      }

      .modal p {
        margin: 0 0 1rem;
        color: #9aa0a6;
        font-size: 0.9rem;
      }

      #username-input {
        width: 100%;
        padding: 0.75rem 0.9rem;
        border: 1px solid #2a2f3a;
        border-radius: 10px;
        background: #0f1117;
        color: #e8eaed;
        font: inherit;
        margin-bottom: 0.75rem;
      }

      #status {
        min-height: 1.25rem;
        font-size: 0.85rem;
        color: #f87171;
        margin-bottom: 0.75rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Simple Chat</h1>
      <div id="online-count">0 online</div>
    </header>

    <main id="messages" aria-live="polite"></main>

    <form id="composer">
      <input
        id="message-input"
        type="text"
        placeholder="Type a message..."
        autocomplete="off"
        disabled
      />
      <button type="submit" id="send-button" disabled>Send</button>
    </form>

    <div id="overlay">
      <div class="modal">
        <h2>Choose a username</h2>
        <p>Pick a name to join the room.</p>
        <input
          id="username-input"
          type="text"
          maxlength="32"
          placeholder="Your name"
          autocomplete="username"
        />
        <div id="status"></div>
        <button type="button" id="join-button">Join chat</button>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById("messages");
      const onlineCountEl = document.getElementById("online-count");
      const composer = document.getElementById("composer");
      const messageInput = document.getElementById("message-input");
      const sendButton = document.getElementById("send-button");
      const overlay = document.getElementById("overlay");
      const usernameInput = document.getElementById("username-input");
      const joinButton = document.getElementById("join-button");
      const statusEl = document.getElementById("status");

      const USERNAME_KEY = "simple-chat-username";
      let username = localStorage.getItem(USERNAME_KEY) || "";
      let socket = null;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendSystem(text, time) {
        const el = document.createElement("div");
        el.className = "system";
        el.textContent = time ? `${text} · ${time}` : text;
        messagesEl.appendChild(el);
        scrollToBottom();
      }

      function appendMessage(user, text, time, isOwn) {
        const el = document.createElement("div");
        el.className = `message ${isOwn ? "own" : "other"}`;

        const meta = document.createElement("div");
        meta.className = "message-meta";
        meta.textContent = `${user} · ${time}`;

        const body = document.createElement("div");
        body.textContent = text;

        el.appendChild(meta);
        el.appendChild(body);
        messagesEl.appendChild(el);
        scrollToBottom();
      }

      function setOnlineCount(count) {
        onlineCountEl.textContent = `${count} online`;
      }

      function enableChat(enabled) {
        messageInput.disabled = !enabled;
        sendButton.disabled = !enabled;
        if (enabled) {
          messageInput.focus();
        }
      }

      function connect() {
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        socket = new WebSocket(`${protocol}//${location.host}`);

        socket.addEventListener("open", () => {
          enableChat(true);
          setStatus("");
        });

        socket.addEventListener("close", () => {
          enableChat(false);
          appendSystem("Disconnected. Refresh to reconnect.");
        });

        socket.addEventListener("message", (event) => {
          let data;
          try {
            data = JSON.parse(event.data);
          } catch {
            return;
          }

          if (data.type === "message") {
            appendMessage(data.user, data.text, data.time, data.user === username);
          } else if (data.type === "system") {
            appendSystem(data.text, data.time);
          } else if (data.type === "users") {
            setOnlineCount(data.count);
          }
        });
      }

      function joinChat() {
        const name = usernameInput.value.trim().slice(0, 32);
        if (!name) {
          setStatus("Please enter a username.");
          usernameInput.focus();
          return;
        }

        username = name;
        localStorage.setItem(USERNAME_KEY, username);
        overlay.classList.add("hidden");
        connect();
      }

      function sendMessage(text) {
        const trimmed = text.trim();
        if (!trimmed || !socket || socket.readyState !== WebSocket.OPEN) {
          return;
        }

        socket.send(
          JSON.stringify({
            type: "message",
            user: username,
            text: trimmed,
          })
        );
      }

      joinButton.addEventListener("click", joinChat);

      usernameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          joinChat();
        }
      });

      composer.addEventListener("submit", (event) => {
        event.preventDefault();
        sendMessage(messageInput.value);
        messageInput.value = "";
      });

      if (username) {
        usernameInput.value = username;
      } else {
        usernameInput.focus();
      }
    </script>
  </body>
</html>
